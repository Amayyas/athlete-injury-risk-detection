name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# A new push on a branch cancels the previous, still-running check.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, format & types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install the package
        run: pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check --output-format=github .

      - name: Black (format)
        run: black --check --diff .

      - name: Mypy (types)
        run: mypy

  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The project declares requires-python >= 3.12.
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install the package
        run: pip install -e ".[dev]"

      - name: Pytest (with coverage floor)
        run: pytest --cov-report=term --cov-report=xml

      - name: Coverage summary
        if: always()
        run: |
          {
            echo "### Coverage — Python ${{ matrix.python-version }}"
            echo '```'
            coverage report
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v5
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error
