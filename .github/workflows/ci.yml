name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# A new push on a branch cancels the previous, still-running check.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, format & types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements*.lock

      - name: Install the package (pinned)
        run: pip install -c requirements-dev.lock -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check --output-format=github .

      - name: Black (format)
        run: black --check --diff .

      - name: Mypy (types)
        run: mypy

  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The project declares requires-python >= 3.12.
        #
        # 3.12 installs from the lock: that is the reproducible build, the one the
        # Docker image and the deployment will use.
        # 3.13 installs *unpinned* on purpose: it is the canary that catches an
        # upstream release breaking us, before we bump the lock.
        include:
          - python-version: "3.12"
            constraints: "-c requirements-dev.lock"
          - python-version: "3.13"
            constraints: ""
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements*.lock

      - name: Install the package
        run: pip install ${{ matrix.constraints }} -e ".[dev]"

      - name: Pytest (with coverage floor)
        run: pytest --cov-report=term --cov-report=xml

      - name: Coverage summary
        if: always()
        run: |
          {
            echo "### Coverage — Python ${{ matrix.python-version }}"
            echo '```'
            coverage report
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v5
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error

  notebooks:
    name: Notebooks execute
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements*.lock

      - name: Install the package (pinned)
        run: pip install -c requirements-dev.lock -e ".[dev]"

      # The notebook silently drifted broken once — it referenced columns the ML
      # redesign removed, and nothing re-ran it. Executing it here is the only proof
      # it still works. Its data-audit cells guard on the (gitignored) Kaggle files
      # and skip cleanly when they are absent, which they are in CI.
      - name: Execute every notebook
        run: |
          jupyter nbconvert --to notebook --execute --stdout \
            --ExecutePreprocessor.timeout=600 notebooks/*.ipynb > /dev/null

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # gitleaks scans history, not just the tip

      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Audit the *pinned* set, since that is what actually gets deployed.
      - name: Audit dependencies for known vulnerabilities
        run: |
          pip install pip-audit
          pip-audit --requirement requirements.lock --strict
