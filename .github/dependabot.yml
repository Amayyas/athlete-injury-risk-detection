version: 2
updates:
  # Python dependencies declared in pyproject.toml.
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # One PR for routine bumps rather than a flood; majors stay separate so they
      # get reviewed on their own.
      python-minor:
        update-types: ["minor", "patch"]
    labels: ["infra"]

  # The GitHub Actions themselves (checkout, setup-python, upload-artifact…).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels: ["ci"]
